<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOR Doc-Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f7ff; }
        input:focus { box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white border border-sky-100 p-6 sm:p-8 rounded-3xl shadow-xl space-y-6">
        <div class="absolute top-4 left-4">
            <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-sky-600 transition flex items-center gap-1">
                🏠 กลับหน้าหลัก
            </a>
        </div>
        <div class="text-center">
            <div class="w-12 h-12 bg-sky-50 border border-sky-100 rounded-2xl flex items-center justify-center mx-auto shadow-inner">
                <span class="text-2xl">🩺</span>
            </div>
            <h1 class="text-2xl font-black text-sky-600 mt-3 tracking-tight">HAMOR Doc-Login</h1>
            <p class="text-xs text-slate-400 mt-1 font-medium">เข้าสู่ระบบหลังบ้านเพื่อเข้าเวรตรวจรักษาผู้ป่วยในระบบ</p>
        </div>

        <form onsubmit="handleDoctorLogin(event)" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block">Doctor Username</label>
                <input type="text" id="docUser" required placeholder="ใส่ไอดีผู้ใช้งานแพทย์ (e.g., doc-1)" class="w-full bg-sky-50/50 border border-sky-100 text-slate-800 text-sm px-4 py-3 rounded-2xl focus:outline-none focus:border-sky-400 focus:bg-white transition">
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block">Security Password</label>
                <input type="password" id="docPass" required placeholder="••••••••" class="w-full bg-sky-50/50 border border-sky-100 text-slate-800 text-sm px-4 py-3 rounded-2xl focus:outline-none focus:border-sky-400 focus:bg-white transition">
            </div>

            <button type="submit" class="w-full py-3.5 bg-sky-600 hover:bg-sky-500 text-white font-bold text-sm rounded-xl transition shadow-md shadow-sky-600/10 flex items-center justify-center gap-2">
                เข้าสู่ระบบคลินิกแพทย์ ➔
            </button>
        </form>
    </div>

    <script>
        async function handleDoctorLogin(e) {
            e.preventDefault();
            const user = document.getElementById('docUser').value.trim();
            const pass = document.getElementById('docPass').value.trim();

            try {
                const response = await fetch('http://127.0.0.1:8000/api/doctor/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username_or_email: user, password: pass })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    // 🛠️ แก้ไข Bug: เปลี่ยนจากดึงค่า (getItem) มาเป็นบันทึกค่า (setItem) ลงเครื่องเพื่อใช้สิทธิ์ในหน้า Dashboard
                    localStorage.setItem('doc_id', data.doctor_id);
                    localStorage.setItem('doc_name', data.name);
                    localStorage.setItem('doc_dept', data.department);
                    window.location.href = 'doctor_dashboard.html';
                } else {
                    alert(`⚠️ ข้อผิดพลาด: ${data.detail || 'ไม่สามารถยืนยันสิทธิ์แพทย์ได้'}`);
                }
            } catch (err) {
                console.error(err);
                alert("🚨 เกิดข้อผิดพลาดทางเทคนิค ไม่สามารถติดต่อระบบ Unified API หลังบ้านได้");
            }
        }
    </script>
</body>
</html>
