<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOR หาหมอ - นัดพบแพทย์ ปรึกษาออนไลน์ ใส่ใจสุขภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #020617;
        }
        /* ดึงภาพจาก S__4661252.jpg มาเป็น Full Background แบบลื่นไหล */
        .bg-hamor-texture {
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.85), rgba(15, 23, 42, 0.4)), url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* เอฟเฟกต์แสงไฟแบบสะท้อน (Glassmorphism) สำหรับปุ่มเมนูหลักตามภาพ */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between bg-hamor-texture">

    <!-- 🌐 ส่วนหัวเว็บ (Navbar) -->
    <header class="w-full max-w-7xl mx-auto p-4 sm:p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <span class="text-2xl animate-pulse">🩺</span>
            <span class="font-black text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-emerald-400">HAMOR</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="doctor_login.html" class="text-xs font-bold bg-slate-900/80 hover:bg-slate-800 text-slate-300 border border-slate-700/50 px-4 py-2 rounded-xl transition shadow-lg">
                👨‍⚕️ สำหรับแพทย์
            </a>
            <a href="auth.html" class="text-xs font-bold bg-gradient-to-r from-sky-500 to-emerald-500 hover:from-sky-400 hover:to-emerald-400 text-slate-950 px-4 py-2 rounded-xl transition shadow-lg shadow-sky-500/20">
                เข้าสู่ระบบคนไข้
            </a>
        </div>
    </header>

    <!-- 🎯 ส่วนเนื้อหาหลักกลางจอ (Hero Content - จำลองอัตลักษณ์ตามรูปภาพ) -->
    <main class="flex-1 flex flex-col items-center justify-center text-center px-4 max-w-3xl mx-auto my-8 space-y-6 z-10">
        
        <!-- โลโก้จำลองหัวใจและเทคโนโลยีแพทย์ -->
        <div class="relative w-28 h-28 bg-gradient-to-tr from-sky-500/10 to-emerald-500/10 rounded-3xl border border-sky-400/30 flex items-center justify-center shadow-2xl shadow-sky-500/10 group">
            <div class="absolute inset-0 bg-gradient-to-tr from-sky-500 to-emerald-500 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
            <span class="text-5xl filter drop-shadow"><img src="logo.jpg" style="border-radius: 25%;"></span>
        </div>

        <!-- ชื่องานและสโลแกนตามภาพ S__4661252.jpg -->
        <div class="space-y-3">
            <h1 class="text-5xl sm:text-6xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-white via-sky-100 to-sky-300 filter drop-shadow-sm">
                HAMOR
            </h1>
            <div class="flex items-center justify-center gap-3 text-emerald-400 font-bold text-lg sm:text-xl tracking-widest">
                <span>—</span> <span class="text-white font-extrabold text-2xl">หาหมอ</span> <span>—</span>
            </div>
            <p class="text-slate-300 text-xs sm:text-sm font-medium tracking-wide max-w-md mx-auto leading-relaxed">
                นัดพบแพทย์ ปรึกษาออนไลน์ ใส่ใจสุขภาพ
            </p>
        </div>

        <!-- 🎛️ แผง 4 ปุ่มหลักแปลงจากดีไซน์แถบล่างของรูปภาพ -->
        <div class="w-full max-w-2xl mt-12 glass-panel p-3 rounded-3xl shadow-2xl border-white/10 grid grid-cols-2 sm:grid-cols-4 gap-2">
            
            <!-- ปุ่มที่ 1: นัดพบแพทย์ (เชื่อมไปหน้าแดชบอร์ดคนไข้เพื่อจองคิว) -->
            <button onclick="navigateToDashboard('appointment')" class="p-4 rounded-2xl bg-slate-950/40 hover:bg-sky-500/10 border border-transparent hover:border-sky-500/30 flex flex-col items-center justify-center gap-2 group transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-sky-500/10 flex items-center justify-center text-xl text-sky-400 group-hover:scale-110 transition-transform">
                    📅
                </div>
                <span class="text-xs font-bold text-slate-200 group-hover:text-sky-400 transition-colors">นัดพบแพทย์</span>
            </button>

            <!-- ปุ่มที่ 2: ปรึกษาออนไลน์ (เชื่อมไปเปิดห้อง Telehealth แชทสด) -->
            <button onclick="navigateToDashboard('chat')" class="p-4 rounded-2xl bg-slate-950/40 hover:bg-emerald-500/10 border border-transparent hover:border-emerald-500/30 flex flex-col items-center justify-center gap-2 group transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center text-xl text-emerald-400 group-hover:scale-110 transition-transform">
                    💬
                </div>
                <span class="text-xs font-bold text-slate-200 group-hover:text-emerald-400 transition-colors">ปรึกษาออนไลน์</span>
            </button>

            <!-- ปุ่มที่ 3: แพทย์ผู้เชี่ยวชาญ (แสดงข้อมูลความเชื่อมั่น) -->
            <button onclick="showAlertInfo('👨‍⚕️ ศูนย์รวมทีมแพทย์ผู้เชี่ยวชาญเฉพาะทาง พร้อมให้คำปรึกษาตลอด 24 ชั่วโมง ผ่านระบบคัดกรองอัจฉริยะ')" class="p-4 rounded-2xl bg-slate-950/40 hover:bg-amber-500/10 border border-transparent hover:border-amber-500/30 flex flex-col items-center justify-center gap-2 group transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center text-xl text-amber-400 group-hover:scale-110 transition-transform">
                    🩺
                </div>
                <span class="text-xs font-bold text-slate-200 group-hover:text-amber-400 transition-colors">แพทย์ผู้เชี่ยวชาญ</span>
            </button>

            <!-- ปุ่มที่ 4: ปลอดภัยเป็นส่วนตัว (แสดงมาตรฐานความปลอดภัย) -->
            <button onclick="showAlertInfo('🔒 ข้อมูลเวชระเบียนและประวัติแชททั้งหมดถูกจัดเก็บด้วยโครงสร้างรักษาความปลอดภัยขั้นสูง (HIPAA Compliance) มั่นใจได้ 100%')" class="p-4 rounded-2xl bg-slate-950/40 hover:bg-teal-500/10 border border-transparent hover:border-teal-500/30 flex flex-col items-center justify-center gap-2 group transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-teal-500/10 flex items-center justify-center text-xl text-teal-400 group-hover:scale-110 transition-transform">
                    🛡️
                </div>
                <span class="text-xs font-bold text-slate-200 group-hover:text-teal-400 transition-colors">ปลอดภัยเป็นส่วนตัว</span>
            </button>

        </div>

    </main>

    <!-- 📝 ส่วนท้ายเว็บ (Footer) ตามข้อมูลเครดิตรูปภาพท้ายจอ -->
    <footer class="w-full text-center py-6 px-4 z-10 border-t border-slate-900 bg-slate-950/80 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto flex flex-col items-center justify-center gap-1">
            <div class="flex items-center gap-2 text-slate-500 text-[10px] tracking-widest uppercase">
                <span>—</span> <span>ทีม Z-EN CS 70</span> <span>—</span>
            </div>
            <p class="text-xs font-bold text-slate-400 tracking-wide">
                โรงเรียนนครพนมวิทยาคม
            </p>
        </div>
    </footer>

    <!-- 🧠 สคริปต์ควบคุมการทำงานและนำทาง (Navigation Logic) -->
    <script>
        // ฟังก์ชันช่วยนำทางไปยังระบบต่างๆ โดยเช็กสิทธิ์คนไข้ก่อน
        function navigateToDashboard(targetFeature) {
            const userId = localStorage.getItem('user_id');
            
            if (!userId) {
                alert("🔒 กรุณาเข้าสู่ระบบผู้รับบริการ (คนไข้) เพื่อเข้าถึงฟีเจอร์นี้ครับ");
                window.location.href = 'auth.html';
                return;
            }

            // ถ้าล็อกอินแล้ว ส่งไปที่แดชบอร์ดคนไข้ตามเป้าหมาย
            window.location.href = 'dashboard.html';
        }

        // ฟังก์ชันแสดงกล่องข้อความข้อมูลสำหรับปุ่มสารสนเทศ
        function showAlertInfo(message) {
            alert(message);
        }
    </script>
</body>
</html>
